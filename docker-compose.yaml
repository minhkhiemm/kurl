version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kurl-postgres
    environment:
      POSTGRES_USER: kurl
      POSTGRES_PASSWORD: kurl
      POSTGRES_DB: kurl
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kurl"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
